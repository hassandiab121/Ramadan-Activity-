{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الأنشطة الرمضانية</title>
    <link rel="stylesheet" href="{% static 'CSS/show_activities_style.css' %}">
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="{% url 'show_activities' %}" class="btn-add">الصفحة الرئيسية</a>
                
            </div>
        </div>

            <h1>الأنشطة الرمضانية</h1>

            {% if messages %}
            <div class="join-confirmation">
                {% for message in messages %}
                    {% if message.tags == 'success' %}
                    <div class="join-confirmation-box" role="alert">
                        <span class="icon">✓</span>
                        {{ message }}
                    </div>
                    {% endif %}
                {% endfor %}
            </div>
            {% endif %}
 
        </body>
</html>
